# fly.toml app configuration file generated for vibe-splitter on 2026-03-19T12:22:16+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'vibe-splitter'
primary_region = 'ams'

[build]

[env]
  SPOTIPY_CACHE_PATH = '/data/.spotify_cache'
  VS_CACHE_FILE = '/data/track_cache.json'
  VS_DB_FILE = '/data/vibe_splitter.db'
  VS_LOG_FILE = '/data/vibe_splitter.log'
  VS_LOG_FORMAT = 'json'
  VS_MODEL_FILE = '/data/splitter_model.npz'
  VS_MODEL_META_FILE = '/data/splitter_model_meta.json'
  VS_STATE_FILE = '/data/splitter_state.json'

[[mounts]]
  source = 'vibe_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
